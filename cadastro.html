<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RotaVerde | Seja um Parceiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo-box">
                <img src="assets/logo.png" alt="Logo" class="logo-img">
                Rota<span>Verde</span>
            </a>
            <nav><a href="index.html">Início</a> <a href="login.html">Login</a></nav>
        </div>
    </header>

    <main class="form-wrapper">
        <div class="form-card">
            <img src="assets/logo.png" alt="Logo" style="width: 85px; margin-bottom: 20px;">
            <h2>Seja um Pioneiro</h2>
            <p style="margin-bottom: 25px;">Cadastre seu interesse e mude Fortaleza</p>
            <form>
                <input type="text" placeholder="Nome da Empresa / Nome Completo" required>
                <input type="email" placeholder="Seu melhor e-mail" required>
                <select required>
                    <option value="" disabled selected>O que você é?</option>
                    <option>Comerciante (Bares/Restaurantes)</option>
                    <option>Catador Autônomo</option>
                    <option>Cooperativa de Reciclagem</option>
                </select>
                <button type="submit" class="btn-main" style="width: 100%; border-radius: 12px;">Enviar Cadastro</button>
            </form>
        </div>
    </main>

    <footer><p>&copy; 2026 RotaVerde - Projeto Empreendedorismo UFC</p></footer>
</body>
</html>

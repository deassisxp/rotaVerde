<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Participe do Piloto RotaVerde - Faça seu cadastro e colabore para a otimização de coleta seletiva em Fortaleza.">
    <title>RotaVerde | Participe do Piloto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo-box">
                <img src="assets/logo.png" alt="Logo RotaVerde" class="logo-img">
                Rota<span>Verde</span>
            </a>
            <nav>
                <a href="index.html">Início</a>
                <a href="solucao.html">Solução</a>
                <a href="sobre.html">Sobre</a>
                <a href="login.html">Entrar</a>
                <a href="cadastro.html" class="btn-nav">Participar do Piloto</a>
            </nav>
        </div>
    </header>

    <main class="form-wrapper">
        <div class="form-card">
            <img src="assets/logo.png" alt="Logo" style="width: 85px; margin-bottom: 20px;">
            <h2>Seja um Pioneiro</h2>
            <p style="margin-bottom: 25px;">Inscreva-se no projeto piloto (MVP Concierge) da UFC</p>
            <form>
                <input type="text" placeholder="Nome da Empresa / Nome Completo" required>
                <input type="email" placeholder="Seu melhor e-mail" required>
                <input type="tel" placeholder="WhatsApp (ex: 85 99999-9999)" required>
                <input type="text" placeholder="Endereço / Área de Atuação (Fortaleza)" required>
                <select required>
                    <option value="" disabled selected>O que você é?</option>
                    <option>Comerciante (Bares/Restaurantes)</option>
                    <option>Catador Autônomo</option>
                    <option>Cooperativa de Reciclagem</option>
                </select>
                <button type="submit" class="btn-main" style="width: 100%; border-radius: 12px;">Inscrever no Piloto</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 RotaVerde - Projeto Empreendedorismo UFC</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesse o Painel RotaVerde para gerenciar suas coletas de resíduos e consultar relatórios de descarte em Fortaleza.">
    <title>RotaVerde | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo-box">
                <img src="assets/logo.png" alt="Logo RotaVerde" class="logo-img">
                Rota<span>Verde</span>
            </a>
            <nav>
                <a href="index.html">Início</a>
                <a href="solucao.html">Solução</a>
                <a href="sobre.html">Sobre</a>
                <a href="login.html">Entrar</a>
                <a href="cadastro.html" class="btn-nav">Participar do Piloto</a>
            </nav>
        </div>
    </header>

    <main class="form-wrapper">
        <div class="form-card">
            <img src="assets/logo.png" alt="Logo" style="width: 85px; margin-bottom: 20px;">
            <h2>Painel RotaVerde</h2>
            <p style="margin-bottom: 25px;">Acesse sua conta para gerenciar coletas</p>
            <form>
                <input type="email" placeholder="E-mail de acesso" required>
                <input type="password" placeholder="Sua senha" required>
                <button type="submit" class="btn-main" style="width: 100%; border-radius: 12px;">Acessar</button>
            </form>
            <p style="margin-top: 25px; font-size: 0.95rem;">
                Não é parceiro? <a href="cadastro.html" style="color: #27ae60; font-weight: bold; text-decoration: none;">Inscreva-se no Piloto</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 RotaVerde - Projeto Empreendedorismo UFC</p>
    </footer>
</body>
</html>
